<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LIFE</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- デバッグ用リセットボタン (検証用) -->
  <button id="debug-reset-btn">Reset Session</button>

  <!-- 金の額縁 (Gold Picture Frame) 外枠 -->
  <div id="gold-frame-outer">
    <div id="gold-frame-inner">

      <!-- ゲーム全体コンテナ (アスペクト比 4:3) -->
      <div id="game-container">
        
        <!-- 共通ノイズ/赤みオーバーレイ -->
        <div id="noise-overlay"></div>

        <!-- 共通タイマーバー -->
        <div class="timer-container" id="global-timer-container" style="display: none;">
          <div id="timer-bar"></div>
        </div>

        <!-- 画面中央上部のカウントダウン数字 -->
        <div id="countdown-number" style="display: none;">5</div>

        <!-- 電車通過用 Canvas (z-index: 30) -->
        <canvas id="train-canvas"></canvas>

        <!-- ⑤・⑥共通のシルエットレイヤー (アニメーションや結果表示時に使用) -->
        <div id="global-silhouette-layer" class="silhouette-layer" style="display: none;">
          <svg id="silhouette-mother" class="silhouette-svg" viewBox="0 0 100 240">
            <circle cx="50" cy="40" r="16" class="svg-silhouette" />
            <path d="M50,56 C44,56 32,62 30,70 L26,120 C25,125 28,130 32,130 L35,130 L30,220 C29,225 33,230 38,230 L45,230 L46,240 L49,240 L48,230 L52,230 L51,240 L54,240 L55,230 L62,230 C67,230 71,225 70,220 L65,130 L68,130 C72,130 75,125 74,120 L70,70 C68,62 56,56 50,56 Z" class="svg-silhouette" />
          </svg>
          <svg id="silhouette-child" class="silhouette-svg" viewBox="0 0 120 240">
            <circle cx="35" cy="40" r="18" class="svg-silhouette" style="fill: #000000;" />
            <path d="M35,58 Q45,100 50,115" stroke="#000000" stroke-width="1.5" fill="none" />
            <circle cx="65" cy="90" r="13" class="svg-silhouette" />
            <path d="M65,103 C60,103 52,107 51,113 L48,150 C47,153 50,156 53,156 L55,156 L52,220 C51,223 54,226 57,226 L61,226 L62,234 L64,234 L63,226 L67,226 L68,234 L70,234 L71,226 L75,226 C78,226 81,223 80,220 L77,156 L79,156 C82,156 85,153 84,150 L81,113 C80,107 70,103 65,103 Z" class="svg-silhouette" />
          </svg>
        </div>


        <!-- ⓪ スタート画面 -->
        <div id="screen-00" class="screen">
          <!-- 装飾用の一時停止アイコン風ボタン -->
          <div class="pause-icon-deco">
            <div class="pause-bar"></div>
            <div class="pause-bar"></div>
          </div>
          
          <div class="start-content-container">
            <h1 class="start-title" id="s00-title">LIFE</h1>
            
            <!-- 牛のシルエットボタン -->
            <button id="btn-start-cow" class="cow-btn">
              <svg viewBox="20 15 120 90" class="cow-svg">
                <path class="svg-silhouette" d="M 34 27 L 36 29 L 38 30 L 41 30 L 44 30 L 47 29 L 49 28 L 50 26 L 50 29 L 49 31 L 50 33 L 53 34 L 55 36 L 56 34 L 59 34 L 62 34 L 65 34 L 68 34 L 71 34 L 74 34 L 77 34 L 80 34 L 83 34 L 86 34 L 89 34 L 92 34 L 95 34 L 98 34 L 101 34 L 104 34 L 107 34 L 110 34 L 112 35 L 114 37 L 115 39 L 116 42 L 116 45 L 117 47 L 118 50 L 118 53 L 119 55 L 120 57 L 121 59 L 123 61 L 124 63 L 126 65 L 127 67 L 129 69 L 126 69 L 124 68 L 122 66 L 121 64 L 120 62 L 119 60 L 118 58 L 118 55 L 117 53 L 116 50 L 116 47 L 115 45 L 114 42 L 113 39 L 112 41 L 112 44 L 112 47 L 112 50 L 112 53 L 112 56 L 112 59 L 113 62 L 114 64 L 116 66 L 117 68 L 117 71 L 117 74 L 117 77 L 117 80 L 117 83 L 117 86 L 117 89 L 116 91 L 113 90 L 113 87 L 112 85 L 112 82 L 111 80 L 110 78 L 109 75 L 108 73 L 107 70 L 106 68 L 105 66 L 103 67 L 101 69 L 102 71 L 104 69 L 105 71 L 106 73 L 105 75 L 104 78 L 103 81 L 102 84 L 101 87 L 100 90 L 98 91 L 97 89 L 98 86 L 98 83 L 98 80 L 98 77 L 97 74 L 99 72 L 101 71 L 99 70 L 97 71 L 94 72 L 92 70 L 89 71 L 88 68 L 86 66 L 83 66 L 80 66 L 77 66 L 74 66 L 71 66 L 68 66 L 65 66 L 64 63 L 63 65 L 63 68 L 63 71 L 63 74 L 63 77 L 63 80 L 63 83 L 63 86 L 63 89 L 62 91 L 60 90 L 59 88 L 59 85 L 59 82 L 58 80 L 58 77 L 57 75 L 56 72 L 55 69 L 54 67 L 52 66 L 50 65 L 48 63 L 47 61 L 46 59 L 45 56 L 45 53 L 44 51 L 47 50 L 48 48 L 48 45 L 48 42 L 49 40 L 51 39 L 53 38 L 51 37 L 48 37 L 47 39 L 46 41 L 45 44 L 46 47 L 45 49 L 42 49 L 39 49 L 37 48 L 38 46 L 37 43 L 36 40 L 35 37 L 32 37 L 30 36 L 31 33 L 34 33 L 35 31 L 34 29 L 33 27 L 33 26 Z M 67 68 L 70 68 L 72 69 L 73 72 L 73 75 L 74 77 L 74 80 L 75 82 L 75 85 L 76 87 L 76 90 L 74 91 L 72 89 L 72 86 L 71 84 L 70 82 L 69 79 L 68 77 L 67 74 L 66 72 L 65 70 L 66 68 Z" />
                <text x="81" y="55" class="cow-text" style="font-size: 14px;">ライフ</text>
              </svg>
            </button>
            
            <div class="start-sub-label">
              <div class="lang-ja" id="s00-sub-ja"></div>
              <div class="lang-en" id="s00-sub-en"></div>
            </div>
          </div>
        </div>

        <!-- ① 導入画面 -->
        <div id="screen-01" class="screen">
          <div class="text-container center-text">
            <div class="lang-ja" id="s01-message-ja"></div>
            <div class="lang-en" id="s01-message-en"></div>
          </div>
          <div class="text-container tap-continue" id="s01-tap"></div>
        </div>

        <!-- ② 問い画面 -->
        <div id="screen-02" class="screen">
          <div class="text-container center-text">
            <div class="lang-ja" id="s02-message-ja"></div>
            <div class="lang-en" id="s02-message-en"></div>
          </div>
        </div>

        <!-- ③ 選択画面 -->
        <div id="screen-03" class="screen">
          <div class="selection-container">
            <!-- お母さん選択ボタン (左) -->
            <button class="silhouette-btn" id="btn-choice-mother" disabled>
              <div class="silhouette-label">
                <div class="lang-ja" id="s03-mother-ja"></div>
                <div class="lang-en" id="s03-mother-en"></div>
              </div>
              <svg class="silhouette-svg-btn" viewBox="0 0 100 240">
                <circle cx="50" cy="40" r="16" class="svg-silhouette" />
                <path d="M50,56 C44,56 32,62 30,70 L26,120 C25,125 28,130 32,130 L35,130 L30,220 C29,225 33,230 38,230 L45,230 L46,240 L49,240 L48,230 L52,230 L51,240 L54,240 L55,230 L62,230 C67,230 71,225 70,220 L65,130 L68,130 C72,130 75,125 74,120 L70,70 C68,62 56,56 50,56 Z" class="svg-silhouette" />
              </svg>
            </button>

            <!-- 「動けない」選択ボタン (中央、最初から配置) -->
            <button class="silhouette-btn cantmove-btn-inner" id="btn-choice-cantmove" disabled>
              <div class="silhouette-label">
                <div class="lang-ja" id="s03-cantmove-ja"></div>
                <div class="lang-en" id="s03-cantmove-en"></div>
              </div>
              <!-- シルエットの代わりに配置する、少し不気味な枠線のボタンデザイン -->
              <div class="btn-cantmove-box-visual">
                <div class="cantmove-box-border">
                  <div class="cantmove-box-line"></div>
                </div>
              </div>
            </button>

            <!-- 子ども選択ボタン (右) -->
            <button class="silhouette-btn" id="btn-choice-child" disabled>
              <div class="silhouette-label">
                <div class="lang-ja" id="s03-child-ja"></div>
                <div class="lang-en" id="s03-child-en"></div>
              </div>
              <svg class="silhouette-svg-btn" viewBox="0 0 120 240">
                <circle cx="35" cy="40" r="18" class="svg-silhouette" style="fill: #000000;" />
                <path d="M35,58 Q45,100 50,115" stroke="#000000" stroke-width="1.5" fill="none" />
                <circle cx="65" cy="90" r="13" class="svg-silhouette" />
                <path d="M65,103 C60,103 52,107 51,113 L48,150 C47,153 50,156 53,156 L55,156 L52,220 C51,223 54,226 57,226 L61,226 L62,234 L64,234 L63,226 L67,226 L68,234 L70,234 L71,226 L75,226 C78,226 81,223 80,220 L77,156 L79,156 C82,156 85,153 84,150 L81,113 C80,107 70,103 65,103 Z" class="svg-silhouette" />
              </svg>
            </button>
          </div>
        </div>

        <!-- ⑤ 電車通過中画面 (演出中はCanvasがアクティブになる) -->
        <div id="screen-05" class="screen"></div>

        <!-- ⑥ 結果画面 -->
        <div id="screen-06" class="screen">
          <div class="result-container">
            <!-- 日本語ブロック (2行、上) -->
            <div class="result-group-ja">
              <div class="lang-ja" id="s06-saved-ja"></div>
              <div class="lang-ja" id="s06-lost-ja"></div>
            </div>
            <!-- 英語ブロック (2行、下) -->
            <div class="result-group-en">
              <div class="lang-en" id="s06-saved-en"></div>
              <div class="lang-en" id="s06-lost-en"></div>
            </div>
          </div>
        </div>

        <!-- ⑦ 動けないエンド画面 -->
        <div id="screen-07" class="screen">
          <div class="cantmove-end-container">
            <div class="cantmove-end-title">
              <div class="lang-ja" id="s07-title-ja"></div>
              <div class="lang-en" id="s07-title-en"></div>
            </div>
            <div class="cantmove-end-body">
              <div class="lang-ja" id="s07-body-ja"></div>
              <div class="lang-en" id="s07-body-en"></div>
            </div>
            <div class="cantmove-end-footer">
              <div class="lang-ja" id="s07-footer-ja"></div>
              <div class="lang-en" id="s07-footer-en"></div>
            </div>
          </div>
        </div>

        <!-- ⑧ 二度目画面 -->
        <div id="screen-08" class="screen">
          <div class="text-container center-text">
            <div class="lang-ja" id="s08-message-ja"></div>
            <div class="lang-en" id="s08-message-en"></div>
          </div>
        </div>

      </div> <!-- /#game-container -->

    </div> <!-- /#gold-frame-inner -->
  </div> <!-- /#gold-frame-outer -->

  <!-- スクリプトファイルの読み込み -->
  <script src="config.js"></script>
  <script src="train.js"></script>
  <script src="main.js"></script>
</body>
</html>
